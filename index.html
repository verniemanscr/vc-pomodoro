<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodoro Timer</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="vista-bg"></div>
    <div id="pomodoro-container">
        <div id="pomodoro-timer">
            <div class="timer-progress-container">
                <svg class="circle-timer" viewBox="0 0 100 100">
                    <circle cx="50" cy="50" r="45" class="circle-background" />
                    <circle cx="50" cy="50" r="45" class="circle-progress" />
                    <text id="timer-time" x="50" y="50" text-anchor="middle" dy=".3em" font-size="18" font-family="Roboto">25:00</text>
                </svg>
            </div>
            <div class="timer-controls">
                <button id="start-pause-btn" class="btn">Start</button>
                <button id="skip-btn" class="btn skip">Skip Block</button>
            </div>
            <div class="stats">
                <p id="completed-blocks">Blocks: 0</p>
            </div>
        </div>
    </div>

    <div id="install-button-container">
        <button id="install-button" class="install-btn">
            ⚡ Add to Home Screen
        </button>
    </div>

    <script>
        // Timer variables
        let workDuration = 25 * 60; // 25 minutes in seconds
        let restDuration = 5 * 60; // 5 minutes in seconds
        let longRestDuration = 15 * 60; // 15 minutes in seconds
        let remainingTime = workDuration;
        let isPaused = true;
        let isWorking = true;
        let intervalId;
        let completedBlocks = 0;

        // DOM elements
        const timerTime = document.getElementById('timer-time');
        const startPauseBtn = document.getElementById('start-pause-btn');
        const skipBtn = document.getElementById('skip-btn');
        const completedBlocksDisplay = document.getElementById('completed-blocks');
        const vistaBg = document.getElementById('vista-bg');

        // Format time to MM:SS
        function formatTime(seconds) {
            const minutes = Math.floor(seconds / 60);
            const remainingSeconds = seconds % 60;
            return `${minutes.toString().padStart(2, "0")}:${remainingSeconds.toString().padStart(2, "0")}`;
        }

        // Update timer display and progress bar
        function updateTimer() {
            if (isPaused) return;

            remainingTime--;

            // Update timer display
            timerTime.textContent = formatTime(remainingTime);

            // Check if timer has finished
            if (remainingTime <= 0) {
                isWorking = !isWorking;
                remainingTime = isWorking ? workDuration : restDuration;
                
                // Update visual feedback
                if (!isWorking) {
                    vistaBg.style.filter = 'blur(5px) grayscale(0.6) brightness(0.5)';
                    completedBlocks++;
                    completedBlocksDisplay.textContent = `Blocks: ${completedBlocks}`;
                    
                    // Check if we need a long break (every 3 blocks)
                    if (completedBlocks % 3 === 0) {
                        remainingTime = longRestDuration;
                        alert(`🎉 Long break time! Take a 15-minute break!`);
                    }
                } else {
                    vistaBg.style.filter = 'blur(0px) grayscale(0) brightness(1)';
                }

                // Pause timer after reset
                isPaused = true;
                startPauseBtn.textContent = 'Start';
            }
        }

        // Start/Stop timer
        startPauseBtn.addEventListener('click', () => {
            isPaused = !isPaused;
            
            if (isPaused) {
                startPauseBtn.textContent = 'Start';
                if (intervalId) clearInterval(intervalId);
                intervalId = null;
            } else {
                startPauseBtn.textContent = 'Pause';
                if (!intervalId) {
                    intervalId = setInterval(updateTimer, 1000);
                }
            }
        });

        // Skip current block
        skipBtn.addEventListener('click', () => {
            isWorking = !isWorking;
            remainingTime = isWorking ? workDuration : restDuration;
            
            if (!isWorking) {
                completedBlocks++;
                completedBlocksDisplay.textContent = `Blocks: ${completedBlocks}`;
                
                // Check if we need a long break (every 3 blocks)
                if (completedBlocks % 3 === 0) {
                    remainingTime = longRestDuration;
                    alert(`🎉 Long break time! Take a 15-minute break!`);
                }
            }

            startPauseBtn.textContent = 'Pause';
            intervalId = setInterval(updateTimer, 1000);
        });

        // Initialize timer
        window.onload = () => {
            // Set initial state
            startPauseBtn.textContent = 'Start';
            timerTime.textContent = formatTime(workDuration);
            completedBlocksDisplay.textContent = `Blocks: 0`;
            
            // Set initial background
            vistaBg.style.filter = 'blur(0px) grayscale(0) brightness(1)';
        };

        // Make sure we handle window close to avoid memory leaks
        window.addEventListener('beforeunload', () => {
            if (intervalId) {
                clearInterval(intervalId);
            }
        });

        // Custom install button
        document.addEventListener('DOMContentLoaded', () => {
            const installButton = document.getElementById('install-button');
            
            if ('serviceWorker' in navigator) {
                installButton.addEventListener('click', () => {
                    if (navigator.serviceWorker.controller) {
                        // If we have a service worker, we can install
                        navigator.serviceWorker.ready.then(registration => {
                            // Show the install prompt
                            registration.active.postMessage({ type: 'install' });
                        });
                    } else {
                        // If no service worker, we need to register one
                        navigator.serviceWorker.register('sw.js').then(() => {
                            // After registration, try again
                            setTimeout(() => {
                                installButton.click();
                            }, 1000);
                        });
                    }
                });
            }
        });
    </script>

    <!-- Service Worker -->
   <script>
    // Service Worker registration (for browser detection)
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('/sw.js')  // Ensure correct path to sw.js
                .then(registration => {
                    console.log('Service Worker registered:', registration);
                })
                .catch(error => {
                    console.error('Service Worker registration failed:', error);
                });
        });
    }
</script>


    <!-- Manifest -->
    <link rel="manifest" href="manifest.json">
    
    <script>
    let deferredPrompt;

    window.addEventListener('beforeinstallprompt', (e) => {
        // Prevent Chrome 67 and earlier from automatically showing the prompt
        e.preventDefault();
        
        // Stash the event so it can be triggered later.
        deferredPrompt = e;
        
        // Update UI to notify the user they can add to home screen
        installButton.style.display = 'block';
    });

    const installButton = document.getElementById('install-button');
    installButton.addEventListener('click', (e) => {
        if (!deferredPrompt) return;
        
        // Hide the app provided install promotion
        installButton.style.display = 'none';
        
        // Show the install prompt
        deferredPrompt.prompt();
        
        // Wait for the user to respond to the prompt
        deferredPrompt.userChoice.then((choiceResult) => {
            if (choiceResult.outcome === 'accepted') {
                console.log('User accepted the A2HS prompt');
            } else {
                console.log('User dismissed the A2HS prompt');
            }
            
            // Reset the deferred prompt variable
            deferredPrompt = null;
        });
    });

    window.addEventListener('appinstalled', (evt) => {
        console.log('INSTALL EVENT TRIGGERED!');
    });
</script>
</body>
</html>
