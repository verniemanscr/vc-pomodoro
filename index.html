<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodoro Timer</title>
    <!-- Manifest Link -->
    <link rel="manifest" href="/manifest.json">
    <!-- Stylesheet -->
    <link rel="stylesheet" href="/style.css">
    <!-- Fontawesome for icons (optional) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div id="pomodoro-container">
        <div id="timer-display">
            <svg class="circle-timer" viewBox="0 0 100 100">
                <circle cx="50" cy="50" r="45" class="circle-background" />
                <circle cx="50" cy="50" r="45" class="circle-progress" />
                <text id="timer-time" x="50" y="50" text-anchor="middle" dy=".3em">25:00</text>
            </svg>
        </div>
        <div class="controls">
            <button id="start-pause-btn" class="btn">Start</button>
            <button id="skip-btn" class="btn skip">Skip Block</button>
        </div>
        <div class="stats">
            <p id="completed-blocks">Blocks: 0</p>
        </div>
    </div>

    <!-- Install Button (hidden by default) -->
    <div id="install-button-container" style="display:none;">
        <button id="install-button" class="btn install-btn">
            ⚡ Add to Home Screen
        </button>
    </div>

    <!-- Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(registration => {
                        console.log('Service Worker registered:', registration);
                    })
                    .catch(error => {
                        console.error('Service Worker registration failed:', error);
                    });
            });
        }
    </script>

    <!-- Main JavaScript -->
    <script src="/main.js"></script>
</body>
</html>
