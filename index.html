<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodoro Timer</title>
    <!-- Manifest Link -->
    <link rel="manifest" href="/manifest.json"> <!-- Ensure correct path -->
    <link rel="stylesheet" href="/style.css"> <!-- Ensure correct path if not in root -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <!-- Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')  // Ensure correct path to sw.js
                    .then(registration => {
                        console.log('Service Worker registered:', registration);
                    })
                    .catch(error => {
                        console.error('Service Worker registration failed:', error);
                    });
            });
        }
    </script>
</head>
<body>
    <div id="vista-bg"></div>
    <div id="pomodoro-container">
        <div id="pomodoro-timer">
            <div class="timer-progress-container">
                <svg class="circle-timer" viewBox="0 0 100 100">
                    <circle cx="50" cy="50" r="45" class="circle-background" />
                    <circle cx="50" cy="50" r="45" class="circle-progress" />
                    <text id="timer-time" x="50" y="50" text-anchor="middle" dy=".3em" font-size="18" font-family="Roboto">25:00</text>
                </svg>
            </div>
            <div class="timer-controls">
                <button id="start-pause-btn" class="btn">Start</button>
                <button id="skip-btn" class="btn skip">Skip Block</button>
            </div>
            <div class="stats">
                <p id="completed-blocks">Blocks: 0</p>
            </div>
        </div>
    </div>

    <div id="install-button-container">
        <!-- Install button is hidden by default -->
        <button id="install-button" class="install-btn" style="display:none;">
            ⚡ Add to Home Screen
        </button>
    </div>

    <script src="/main.js"></script> <!-- Ensure correct path if not in root -->

    <script>
        // Install Button Logic
        let deferredPrompt;

        window.addEventListener('beforeinstallprompt', (e) => {
            // Prevent the mini-infobar from appearing on mobile
            e.preventDefault();
            
            // Stash the event so it can be triggered later.
            deferredPrompt = e;
            
            // Update UI to notify the user they can add to home screen
            const installButton = document.getElementById('install-button');
            installButton.style.display = 'block';
        });

        const installButton = document.getElementById('install-button');
        if (installButton) {
            installButton.addEventListener('click', () => {
                // Hide the app provided install promotion
                installButton.style.display = 'none';
                
                // Show the install prompt
                deferredPrompt.prompt();
                
                // Wait for the user to respond to the prompt
                deferredPrompt.userChoice.then((choiceResult) => {
                    if (choiceResult.outcome === 'accepted') {
                        console.log('User accepted the A2HS prompt');
                    } else {
                        console.log('User dismissed the A2HS prompt');
                    }
                    
                    // Reset the deferred prompt variable
                    deferredPrompt = null;
                });
            });
        }

        window.addEventListener('appinstalled', (evt) => {
            console.log('INSTALL EVENT TRIGGERED!');
        });

    </script>
</body>
</html>
